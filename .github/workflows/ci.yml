name: 검증

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: PowerShell 스크립트 parse 확인
        shell: pwsh
        run: |
          $scripts = Get-ChildItem -Path . -Filter *.ps1 -Recurse
          foreach ($script in $scripts) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($script.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $messages = ($errors | ForEach-Object { $_.Message }) -join "`n"
              throw "Parse failed: $($script.FullName)`n$messages"
            }
          }

      - name: 로컬 상태 파일 추적 여부 확인
        shell: pwsh
        run: |
          $tracked = git ls-files
          $forbidden = $tracked | Where-Object {
            $_ -eq ".env" -or
            ($_ -like ".env.*" -and $_ -ne ".env.example") -or
            $_ -like "logs/*" -or
            $_ -like "state/*"
          }
          if ($forbidden) {
            throw "Forbidden tracked files:`n$($forbidden -join "`n")"
          }

      - name: Pester 테스트 실행
        shell: pwsh
        run: |
          $pester = Get-Module -ListAvailable Pester | Where-Object { $_.Version -ge [version]"5.0" } | Sort-Object Version -Descending | Select-Object -First 1
          if (!$pester) {
            [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12
            if (!(Get-PackageProvider -Name NuGet -ErrorAction SilentlyContinue)) {
              Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -Scope CurrentUser
            }
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
            Install-Module Pester -Force -Scope CurrentUser -SkipPublisherCheck -Confirm:$false
          }
          Import-Module Pester -MinimumVersion 5.0
          Invoke-Pester -Path .\tests -CI

      - name: 민감정보 패턴 스캔
        shell: pwsh
        run: |
          $patterns = @(
            'gho_[A-Za-z0-9_]+',
            'bot[0-9]{6,}:[A-Za-z0-9_-]{20,}',
            '[0-9]{8,}:[A-Za-z0-9_-]{20,}',
            'TELEGRAM_(CHAT_ID|PERSONAL_CHAT_ID|ALLOWED_CHAT_IDS|COMMAND_ALLOWED_CHAT_IDS|START_ALLOWED_CHAT_IDS)\s*=\s*-?[0-9]{5,}',
            'C:\\Users\\[^\\]+\\Documents\\Codex'
          )
          $files = git ls-files
          foreach ($file in $files) {
            $text = Get-Content -LiteralPath $file -Raw -ErrorAction SilentlyContinue
            foreach ($pattern in $patterns) {
              if ($text -match $pattern) {
                throw "Potential secret or local path found in $file"
              }
            }
          }
