name: 릴리스

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "게시할 릴리스 태그입니다. 예: v0.5.0"
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 수동 실행 태그 체크아웃
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_INPUT_TAG: ${{ inputs.tag }}
        shell: pwsh
        run: |
          if ($env:RELEASE_INPUT_TAG -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must look like v0.6.0. Actual: $env:RELEASE_INPUT_TAG"
          }
          git checkout -- $env:RELEASE_INPUT_TAG

      - name: version tag 검증
        env:
          RELEASE_INPUT_TAG: ${{ inputs.tag }}
        shell: pwsh
        run: |
          $releaseTag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { $env:RELEASE_INPUT_TAG } else { $env:GITHUB_REF_NAME }
          if ($releaseTag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must look like v0.6.0. Actual: $releaseTag"
          }

          $version = (Get-Content -LiteralPath .\VERSION -Raw -Encoding UTF8).Trim()
          $tagVersion = $releaseTag -replace '^v', ''
          if ($version -ne $tagVersion) {
            throw "VERSION ($version) does not match tag ($releaseTag)."
          }
          "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_TAG=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: release archive 생성
        shell: pwsh
        run: |
          $archive = "codex-app-telegram-monitor-$env:PACKAGE_VERSION.zip"
          powershell.exe `
            -NoProfile `
            -ExecutionPolicy Bypass `
            -File .\test_release_archive.ps1 `
            -Version $env:PACKAGE_VERSION `
            -ArchivePath $archive `
            -ChecksumPath "$archive.sha256"

      - name: release notes 생성
        shell: pwsh
        run: |
          $version = $env:PACKAGE_VERSION
          $lines = Get-Content -LiteralPath .\CHANGELOG.md -Encoding UTF8
          $start = $null
          for ($index = 0; $index -lt $lines.Count; $index++) {
            if ($lines[$index] -match "^##\s+$([regex]::Escape($version))(\s+-.*)?$") {
              $start = $index
              break
            }
          }
          if ($null -eq $start) {
            throw "CHANGELOG.md does not contain a section for version $version."
          }

          $end = $lines.Count
          for ($index = $start + 1; $index -lt $lines.Count; $index++) {
            if ($lines[$index] -match "^##\s+") {
              $end = $index
              break
            }
          }

          $notes = @($lines[$start..($end - 1)])
          $notes | Set-Content -LiteralPath .\RELEASE_NOTES.md -Encoding UTF8

      - name: GitHub Release 게시
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $archive = "codex-app-telegram-monitor-$env:PACKAGE_VERSION.zip"
          gh release view $env:RELEASE_TAG *> $null
          $releaseExists = $LASTEXITCODE -eq 0

          if ($releaseExists) {
            gh release edit $env:RELEASE_TAG --title $env:RELEASE_TAG --notes-file RELEASE_NOTES.md
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to update GitHub Release metadata for $env:RELEASE_TAG."
            }

            gh release upload $env:RELEASE_TAG $archive "$archive.sha256" --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to upload GitHub Release assets for $env:RELEASE_TAG."
            }
          } else {
            gh release create $env:RELEASE_TAG $archive "$archive.sha256" --title $env:RELEASE_TAG --notes-file RELEASE_NOTES.md --verify-tag
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to create GitHub Release for $env:RELEASE_TAG."
            }
          }
