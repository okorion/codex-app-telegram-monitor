name: 릴리스

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "게시할 릴리스 태그입니다. 예: v0.5.0"
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 수동 실행 태그 체크아웃
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          git checkout "${{ inputs.tag }}"

      - name: version tag 검증
        shell: pwsh
        run: |
          $releaseTag = if ("${{ github.event_name }}" -eq "workflow_dispatch") { "${{ inputs.tag }}" } else { $env:GITHUB_REF_NAME }
          if ($releaseTag -notmatch '^v\d+\.\d+\.\d+$') {
            throw "Release tag must look like v0.5.0. Actual: $releaseTag"
          }

          $version = (Get-Content -LiteralPath .\VERSION -Raw -Encoding UTF8).Trim()
          $tagVersion = $releaseTag -replace '^v', ''
          if ($version -ne $tagVersion) {
            throw "VERSION ($version) does not match tag ($releaseTag)."
          }
          "PACKAGE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_TAG=$releaseTag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: release archive 생성
        shell: pwsh
        run: |
          $archive = "codex-app-telegram-monitor-$env:PACKAGE_VERSION.zip"
          git archive --format zip --output $archive HEAD
          if (!(Test-Path -LiteralPath $archive)) {
            throw "Release archive was not created."
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path -LiteralPath $archive))
          try {
            $names = @($zip.Entries | ForEach-Object { $_.FullName })
          } finally {
            $zip.Dispose()
          }

          foreach ($required in @("README.md", "install_all.ps1", "configure-codex-telegram.ps1", ".env.example", "VERSION")) {
            if ($names -notcontains $required) {
              throw "Release archive is missing required file: $required"
            }
          }

          $forbidden = @($names | Where-Object {
            $_ -eq ".env" -or
            $_ -eq "testResults.xml" -or
            $_ -like "logs/*" -or
            $_ -like "state/*"
          })
          if ($forbidden.Count -gt 0) {
            throw "Release archive contains local-only files:`n$($forbidden -join "`n")"
          }

          $hash = Get-FileHash -Algorithm SHA256 -LiteralPath $archive
          "$($hash.Hash.ToLowerInvariant())  $archive" | Set-Content -LiteralPath "$archive.sha256" -Encoding ASCII

      - name: release notes 생성
        shell: pwsh
        run: |
          $version = $env:PACKAGE_VERSION
          $lines = Get-Content -LiteralPath .\CHANGELOG.md -Encoding UTF8
          $start = $null
          for ($index = 0; $index -lt $lines.Count; $index++) {
            if ($lines[$index] -match "^##\s+$([regex]::Escape($version))(\s+-.*)?$") {
              $start = $index
              break
            }
          }
          if ($null -eq $start) {
            throw "CHANGELOG.md does not contain a section for version $version."
          }

          $end = $lines.Count
          for ($index = $start + 1; $index -lt $lines.Count; $index++) {
            if ($lines[$index] -match "^##\s+") {
              $end = $index
              break
            }
          }

          $notes = @($lines[$start..($end - 1)])
          $notes | Set-Content -LiteralPath .\RELEASE_NOTES.md -Encoding UTF8

      - name: GitHub Release 게시
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $archive = "codex-app-telegram-monitor-$env:PACKAGE_VERSION.zip"
          gh release create $env:RELEASE_TAG $archive "$archive.sha256" --title $env:RELEASE_TAG --notes-file RELEASE_NOTES.md
