<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Codex App Telegram Monitor message examples</title>
  <desc id="desc">Anonymized Telegram-style message examples for status and remote start flow.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1f2937" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="960" height="520" fill="#eef2f7"/>
  <rect x="40" y="36" width="880" height="448" rx="18" fill="#dbeafe"/>
  <circle cx="144" cy="116" r="34" fill="#60a5fa"/>
  <circle cx="820" cy="392" r="46" fill="#93c5fd" opacity="0.62"/>
  <circle cx="776" cy="100" r="22" fill="#bfdbfe" opacity="0.95"/>
  <g filter="url(#shadow)">
    <rect x="92" y="82" width="360" height="252" rx="22" fill="#ffffff"/>
    <text x="118" y="124" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Codex app monitor test</text>
    <text x="118" y="176" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">상태 확인 결과: ✅ OK</text>
    <text x="118" y="216" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#111827">대상: Codex App</text>
    <text x="118" y="246" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#111827">PC: DESKTOP-NAME</text>
    <text x="118" y="276" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#111827">현재 실행 상태: 실행 중</text>
    <text x="118" y="306" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#111827">프로세스: 1개</text>
    <text x="118" y="326" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#6b7280">Processed at: 2026-06-25 12:00:00</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="508" y="104" width="360" height="312" rx="22" fill="#ffffff"/>
    <text x="534" y="146" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">Codex app monitor test</text>
    <text x="534" y="198" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">원격 실행 요청: ▶️ STARTED</text>
    <text x="534" y="238" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#111827">대상: Codex App</text>
    <text x="534" y="268" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#111827">PC: DESKTOP-NAME</text>
    <text x="534" y="298" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#111827">실행 전 상태: 미실행</text>
    <text x="534" y="328" font-family="Segoe UI, Arial, sans-serif" font-size="16" fill="#111827">현재 실행 상태: 실행 확인 중</text>
    <line x1="534" y1="356" x2="842" y2="356" stroke="#e5e7eb" stroke-width="2"/>
    <text x="534" y="392" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#111827">최종 확인 결과: ✅ OK</text>
    <text x="534" y="408" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#6b7280">Processed at: 2026-06-25 12:00:08</text>
